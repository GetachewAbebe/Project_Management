name: Deploy Project to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, hash

      - name: 🔨 Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --optimize-autoloader

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Build Frontend
        run: |
          npm install
          npm run build

      - name: 🔧 Setup Laravel Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 🧪 Run Tests
        run: php artisan test

      - name: 🎨 Check Code Style (Strict)
        run: ./vendor/bin/pint --test

      - name: 🔍 Static Analysis (PHPStan)
        run: composer phpstan

  deploy:
    name: Deploy via cPanel API
    runs-on: ubuntu-latest
    needs: [quality-check]
    steps:
      - name: 🚀 Trigger cPanel Deployment
        run: |
          echo "🚀 Triggering deployment..."
          RESPONSE=$(curl --silent --show-error \
            -H "Authorization: cpanel betingovet:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://betin.gov.et:2083/execute/VersionControlDeployment/create?repository_root=%2Fhome%2Fbetingovet%2Frepositories%2FProject_Management")

          echo "📄 cPanel response: $RESPONSE"

          STATUS=$(echo "$RESPONSE" | grep -o '"status":[0-9]*' | grep -o '[0-9]*')
          if [ "$STATUS" != "1" ]; then
            echo "❌ Deployment failed. See response above."
            exit 1
          fi

          echo "✅ Deployment triggered successfully."

