name: Deploy Project to cPanel

on:
  push:
    branches:
      - main

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, hash

      - name: 🔨 Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --optimize-autoloader

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Build Frontend
        run: |
          npm install
          npm run build

      - name: 🔧 Setup Laravel Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 🧪 Run Tests
        run: php artisan test

      - name: 🎨 Check Code Style (Strict)
        run: ./vendor/bin/pint --test

      - name: 🔍 Static Analysis (PHPStan)
        run: composer phpstan

  trigger-deployment:
    name: Trigger cPanel Deployment
    runs-on: ubuntu-latest
    needs: [quality-check]
    steps:
      - name: 🚀 Call Deployment Webhook
        run: |
          if [ -z "${{ secrets.CPANEL_DEPLOY_WEBHOOK }}" ]; then
            echo "❌ CPANEL_DEPLOY_WEBHOOK secret is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi

          echo "📡 Calling cPanel deployment webhook..."

          HTTP_STATUS=$(curl \
            --silent \
            --show-error \
            --fail \
            --location \
            --max-time 60 \
            --write-out "%{http_code}" \
            --output /tmp/cpanel_response.txt \
            -X GET "${{ secrets.CPANEL_DEPLOY_WEBHOOK }}" \
          )

          echo "📄 cPanel response (HTTP $HTTP_STATUS):"
          cat /tmp/cpanel_response.txt

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "❌ Webhook returned HTTP $HTTP_STATUS. Deployment may not have triggered."
            exit 1
          fi

          echo "✅ Webhook accepted (HTTP $HTTP_STATUS). Deployment triggered on cPanel."

