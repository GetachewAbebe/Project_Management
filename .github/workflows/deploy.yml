name: Deploy Project to cPanel

on:
  push:
    branches:
      - main

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, hash

      - name: 🔨 Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --optimize-autoloader

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Build Frontend
        run: |
          npm install
          npm run build

      - name: 🔧 Setup Laravel Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 🧪 Run Tests
        run: php artisan test

      - name: 🎨 Check Code Style (Strict)
        run: ./vendor/bin/pint --test

      - name: 🔍 Static Analysis (PHPStan)
        run: composer phpstan

  trigger-deployment:
    name: Trigger cPanel Deployment
    runs-on: ubuntu-latest
    needs: [quality-check]
    steps:
      - name: 🚀 Call Deployment Webhook
        run: |
          if [ -z "${{ secrets.CPANEL_DEPLOY_WEBHOOK }}" ]; then
            echo "❌ Error: CPANEL_DEPLOY_WEBHOOK secret is not set in GitHub Settings."
            exit 1
          fi
          curl -X GET "${{ secrets.CPANEL_DEPLOY_WEBHOOK }}"

